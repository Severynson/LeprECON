run:
  name: default_daily_summarization
  dry_run: false
  max_days: 0
  env_file: .env

data:
  raw_articles_path: data/news_raw/new_york_times.tsv
  bert_cache_path: data/news_preprocessed/BERT_label_cache.jsonl
  daily_summary_output_path: data/news_preprocessed/daily_summaries.jsonl
  sp500_path: data/SP500.csv
  daily_summary_price_output_path: data/news_preprocessed/daily_summary_and_price.csv
  report_path: data/news_preprocessed/daily_summarization_report.json
  start_date: 2015-01-01
  end_date: 2026-04-04

gemini:
  model: gemini-2.0-flash
  max_summary_tokens: 400
  max_articles_per_day: 120
  max_chars_per_article: 2000
  parallel_workers: 4
  timeout_seconds: 120
  max_retries: 4
  backoff_seconds: 2.0
